<template>
    <div class={pageClass}>
        <header class="preview-header">
            <div>
                <h1 class="preview-title">請求プレビュー</h1>
                <p class="preview-subtitle">{historyName}</p>
            </div>
            <button
                type="button"
                class="btn btn_secondary"
                onclick={handleClose}
                disabled={isLoading}>
                閉じる
            </button>
        </header>

        <template if:true={errorMessage}>
            <div class="alert alert_error">{errorMessage}</div>
        </template>

        <main class="preview-body">
            <template if:true={showBootstrapLoading}>
                <div class="loading loading_full">
                    <lightning-spinner alternative-text="読み込み中" size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={showBootstrapLoading}>
                <template if:true={hasPreview}>
                    <p class="help-text">
                        契約サービス全体の請求商品を請求日ごとに表示しています。
                    </p>
                    <div class="preview-table-area">
                        <c-order-invoice-preview-table preview={invoicePreview}>
                        </c-order-invoice-preview-table>
                    </div>
                </template>
            </template>
        </main>
    </div>
</template>
